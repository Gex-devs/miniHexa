name: kicad

on:
  push:
    branches:
      - "main"
    paths:
      - audioVisualizer_PCB/**

env:
    PROJECT_NAME: miniHexa
    TEMP_PDF_PATH: ./Preview/temp.pdf
    PREVIEW_DIR: Preview
    EXPORT_SCH_BASH: .github/export_sch.sh
jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: "Add kicad latest Repo"
        run:  sudo add-apt-repository -y ppa:kicad/kicad-9.0-releases && sudo apt -y update 
      - uses: ConorMacBride/install-package@v1.1.0 
        with:
          apt: kicad poppler-utils python3
      - name: "Install Interactive BOM" 
        run: python -m pip install InteractiveHtmlBom
      - name: makeExec
        run: sudo chmod +x $EXPORT_SCH_BASH
      - name: runExport
        run: $EXPORT_SCH_BASH
      - name: genBom
        run: generate_interactive_bom $PROJECT_NAME.kicad_pcb --no-browser True --dest-dir ./ --name-format index --include-tracks True
      - name: "Commit and Push"
        run: |
          git config user.name "${{github.actor}}"
          git config user.email "${{github.actor}}@users.noreply.github.com"
          git add $PREVIEW_DIR 
          git diff --cached --quiet || git commit -m "Update schematic preview [skip ci]"
          git push
      - name: debug
        run: ls -l ./audioVisualizer_PCB/Preview
